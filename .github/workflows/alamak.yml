name: Kora Live Scraper

on:
  schedule:
    - cron: '*/30 * * * *' # Jalankan setiap 30 menit
  workflow_dispatch: # Memungkinkan jalankan manual dari tombol di GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Scraper
        env:
          WORKER_DOMAIN: ${{ secrets.WORKER_DOMAIN }}
        run: python alamak.py

      - name: Commit & Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add full_matches_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update match data" && git push)
