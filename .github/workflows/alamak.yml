name: Kora Live Scraper

on:
  schedule:
    - cron: '*/30 * * * *' # Jalankan setiap 30 menit
  workflow_dispatch: # Memungkinkan jalankan manual dari tab Actions

permissions:
  contents: write # Wajib agar bot bisa melakukan commit & push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Menginstal browser playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run Scraper
        env:
          API_URL: ${{ secrets.API_URL }}
          WORKER_DOMAIN: ${{ secrets.WORKER_DOMAIN }}
        run: python alamak.py

      - name: Commit & Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Cek apakah file ada perubahan
          if [[ -n $(git status -s) ]]; then
            git add full_matches_data.json
            git commit -m "Automated update: match data"
            git push
          else
            echo "Tidak ada perubahan data."
          fi
